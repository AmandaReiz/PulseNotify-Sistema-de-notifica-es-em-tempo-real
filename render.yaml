services:
  - type: web
    name: pulse-notify-api
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/notifications-0.0.1-SNAPSHOT.jar
    envVars:
      - key: ALLOWED_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173,https://frontend-pi-seven-55.vercel.app
